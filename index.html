<!DOCTYPE html>
<html>
<head>
<title>4th Anniversary</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #000, #1a1a1a, #2b1b2b, #000);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 35px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    width: 300px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

h1 {
    color: #ffb6c1;
}

h2 {
    margin: 10px 0;
}

.heart {
    font-size: 30px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0%,100% {transform: scale(1);}
    50% {transform: scale(1.3);}
}

p {
    line-height: 1.6;
    font-size: 15px;
}

.glow {
    text-shadow: 0 0 10px #ffb6c1;
}
</style>

</head>

<body>

<div class="card">
    <div class="heart">🤍</div>
    
    <h1 class="glow">6.7.2022</h1>
    
    <h2>Happy 4th Anniversary</h2>
    <h3>Kyar Kyar</h3>

    <p>
        4 years down,<br>
        forever to go.<br><br>
        I love you,<br>
        today and always 🤍
    </p>
</div>

</body>
</html>
